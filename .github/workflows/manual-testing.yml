name: Manual Test Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        type: choice
        required: true
        default: 'staging'
        options:
          - staging
          - QA
          - production
      run_integration:
        description: 'Include heavy integration tests?'
        type: boolean
        default: false

jobs:
  test:
    name: Execute Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js # Or Python, Go, etc.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test -- --environment=${{ inputs.environment }}

      - name: Run Integration Tests
        # This only runs if the user checked the box in the UI
        if: ${{ inputs.run_integration == true }}
        run: npm run test:integration
